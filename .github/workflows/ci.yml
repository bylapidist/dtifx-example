name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify DTIFx stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Use Node.js 24.15.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start DSR kernel
        run: pnpm run kernel:start

      - name: Validate design-lint config and tokens
        run: pnpm run design-lint:validate

      - name: Run lint and design-lint checks
        run: pnpm run verify

      - name: Enforce warning budget
        run: pnpm run design-lint:check

      - name: Export SARIF report
        run: pnpm run design-lint:sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ops/artifacts/lint/report.sarif
        if: always()

      - name: Validate DTIF tokens
        run: pnpm run dtif:validate

      - name: Generate build artefacts
        run: pnpm run dtif:build

      - name: Compare against diff baseline
        run: pnpm run dtif:diff

      - name: Execute audit policies
        run: pnpm run dtif:audit

      - name: Stop DSR kernel
        run: pnpm run kernel:stop
        if: always()
